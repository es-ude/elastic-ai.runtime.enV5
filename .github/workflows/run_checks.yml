name: "PR Validation"
on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'main'

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: prepare devenv
        uses: ./.github/actions/prepare_devenv
      - name: validate commit messages
        run: devenv shell devenv tasks run check:commit-lint

  clang-format:
    name: Check Code Formatting
    needs:
      - lint-commits
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: prepare devenv
        uses: ./.github/actions/prepare_devenv
      - name: validate code style
        run: devenv shell devenv tasks run check:code-lint

  unit-tests:
    runs-on: ubuntu-latest
    needs:
      - clang-format
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: prepare devenv
        uses: ./.github/actions/prepare_devenv
      - name: run unit-tests
        run: devenv shell devenv tasks run check:unit-test

  build_all_targets:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: prepare devenv
        uses: ./.github/actions/prepare_devenv
      - name: build pico targets
        run: devenv shell devenv tasks run check:build-pico-targets
